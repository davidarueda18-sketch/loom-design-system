<script>
/* Sync data-theme from Storybook globals before React mounts — prevents flash of wrong theme */
(function () {
  try {
    var globals = new URLSearchParams(location.search).get('globals') || '';
    var theme = '';
    globals.split(';').forEach(function (pair) {
      var kv = pair.split(':');
      if (kv[0] === 'theme') theme = decodeURIComponent(kv[1] || '');
    });
    if (theme === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
      document.body.setAttribute('data-theme', 'light');
    }
  } catch (_) {}
})();
</script>
